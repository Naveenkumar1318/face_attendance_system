<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="{{ url_for('static', filename='css file/student_reset_password.css') }}">
<title>Reset Password</title>
</head>
<body>
<div class="container">
  <h2>Reset Password</h2>
  <form method="POST" action="" onsubmit="return validatePassword()">
    <div class="input-container">
      <input type="password" id="new_password" name="new_password" placeholder="New Password" required>
      <span class="eye-btn" onclick="togglePassword('new_password', this)">👁️</span>
    </div>

    <div class="input-container">
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
      <span class="eye-btn" onclick="togglePassword('confirm_password', this)">👁️</span>
    </div>

    <button type="submit">Reset Password</button>
  </form>
  <div style="margin-top:15px;"><a href="/login">Back to Login</a></div>
</div>

<script>
function togglePassword(fieldId, icon) {
    const pwInput = document.getElementById(fieldId);
    if (pwInput.type === "password") {
        pwInput.type = "text";
        icon.textContent = "🙈";
    } else {
        pwInput.type = "password";
        icon.textContent = "👁️";
    }
}

function validatePassword() {
    const pw = document.getElementById('new_password').value;
    const confirmPw = document.getElementById('confirm_password').value;

    // Check for at least 1 uppercase, 1 lowercase, 1 number, 1 special char
    const valid = /[A-Z]/.test(pw) &&
                  /[a-z]/.test(pw) &&
                  /[0-9]/.test(pw) &&
                  /[!@#$%^&*]/.test(pw);

    if (!valid) {
        alert("❌ Password must contain at least 1 uppercase, 1 lowercase, 1 number, and 1 special character!");
        return false;
    }

    if(pw !== confirmPw) {
        alert("❌ Passwords do not match!");
        return false;
    }

    alert("✅ Password reset successfully!");
    return true;
}
</script>
</body>
</html>
