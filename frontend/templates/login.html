<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="{{ url_for('static', filename='css file/login.css') }}">
<title>Student Login</title>
</head>
<body>

<!-- Popup -->
{% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="popup" id="popup">{{ messages[0] }}</div>
    {% endif %}
{% endwith %}

<div class="container">
    <h2>Student Login</h2>
    <form action="/login" method="POST">
        <label for="register_number">Register Number:</label>
        <input type="text" name="register_number" required>

        <label for="password">Password:</label>
        <div class="password-wrapper">
            <input type="password" name="password" id="password" required>
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="navigation">
        <p><a href="/student_forgot_password">Forgot Password?</a></p>
        <p>Don't have an account? <a href="/register">Register here</a></p>
        <p><a href="/">Back to Home</a></p>
    </div>
</div>

<script>
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.querySelector('.toggle-password');
        if (pwd.type === 'password') { pwd.type='text'; icon.textContent='🙈'; }
        else { pwd.type='password'; icon.textContent='👁️'; }
    }

    window.onload = function() {
        const popup = document.getElementById("popup");
        if (popup) {
            popup.style.display="block";
            setTimeout(()=>{ popup.style.display="none"; }, 3000);
        }
    }
</script>
</body>
</html>
