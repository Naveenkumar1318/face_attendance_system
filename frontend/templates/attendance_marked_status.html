<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
     <link rel="stylesheet" href="{{ url_for('static', filename='css file/attendance_marked_status.css') }}">
    <title>Attendance Status</title>
</head>
<body>

    {% if attendance_status == 'success' %}
        <div class="message-box success">
            ✅ Attendance Marked Successfully!
        </div>
    {% else %}
        <div class="message-box fail">
            ❌ Invalid Face or Location. Attendance Not Marked.
        </div>
    {% endif %}

    <div class="navigation">
           <p><a href="{{ url_for('dashboard') }}">Go to Dashboard</a></p>
        </div>

</body>
</html>
