<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="{{ url_for('static', filename='css file/admin_login.css') }}">
  <title>Admin Login</title>
</head>
<body>
  <!-- ✅ Popup Alert Section -->
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div id="popup-alert">
        {% for message in messages %}
          {{ message }}
        {% endfor %}
      </div>
      <script>
        document.getElementById("popup-alert").style.top = "0"; // slide down
        setTimeout(function() {
          document.getElementById("popup-alert").style.top = "-100px"; // slide up
        }, 3000);
      </script>
    {% endif %}
  {% endwith %}

  <div class="container">
    <h2>Admin Login</h2>
    <form method="POST" action="/admin_login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter password" required>
        <span class="toggle-password" onclick="togglePassword()">👁️</span>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="navigation">
      <a href="/" class="plain-link">Back to Home</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById("password");
      const icon = document.querySelector(".toggle-password");
      if (pwd.type === "password") {
        pwd.type = "text";
        icon.textContent = "🙈";
      } else {
        pwd.type = "password";
        icon.textContent = "👁️";
      }
    }
  </script>
</body>
</html>
